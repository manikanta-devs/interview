<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <!-- Dark background -->
  <rect width="1024" height="1024" fill="#0F172A"/>
  
  <!-- Geometric N Icon (high-res, centered) -->
  <g transform="translate(200, 200) scale(4)">
    <!-- Left vertical line -->
    <rect x="0" y="0" width="12" height="80" fill="#3B82F6" rx="2"/>
    
    <!-- Diagonal line -->
    <g transform="translate(6, 0)">
      <line x1="0" y1="0" x2="48" y2="80" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
    </g>
    
    <!-- Right vertical line -->
    <rect x="48" y="0" width="12" height="80" fill="#3B82F6" rx="2"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="850" cy="200" r="12" fill="#3B82F6" opacity="0.6"/>
  <circle cx="900" cy="750" r="8" fill="#3B82F6" opacity="0.4"/>
</svg>
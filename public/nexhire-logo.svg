<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <!-- Dark background -->
  <rect width="240" height="240" fill="#0F172A"/>
  
  <!-- Geometric N Icon -->
  <g transform="translate(30, 30) scale(1.5)">
    <!-- Left vertical line of N -->
    <rect x="0" y="0" width="12" height="80" fill="#3B82F6" rx="2"/>
    
    <!-- Diagonal line of N -->
    <g transform="translate(6, 0)">
      <line x1="0" y1="0" x2="48" y2="80" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
    </g>
    
    <!-- Right vertical line of N -->
    <rect x="48" y="0" width="12" height="80" fill="#3B82F6" rx="2"/>
  </g>
  
  <!-- Brand Text: NexHire -->
  <text x="120" y="160" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600" fill="#E2E8F0" text-anchor="middle" letter-spacing="-0.5">
    NexHire
  </text>
  
  <!-- Subtle accent dot (tech feel) -->
  <circle cx="205" cy="50" r="3" fill="#3B82F6" opacity="0.6"/>
  <circle cx="35" cy="195" r="2" fill="#3B82F6" opacity="0.4"/>
</svg>
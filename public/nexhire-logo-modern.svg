<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main icon - Modern N with gradient -->
  <g transform="translate(50, 40)">
    <!-- Left bar of N -->
    <rect x="8" y="8" width="14" height="84" fill="url(#grad1)" rx="4" filter="url(#glow)"/>
    
    <!-- Diagonal line connecting N bars -->
    <path d="M 22 8 L 88 92" stroke="url(#grad1)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)"/>
    
    <!-- Right bar of N -->
    <rect x="74" y="8" width="14" height="84" fill="url(#grad1)" rx="4" filter="url(#glow)"/>
  </g>
  
  <!-- Accent circles for tech feel -->
  <circle cx="30" cy="30" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="170" cy="170" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="170" cy="30" r="2.5" fill="#06b6d4" opacity="0.4"/>
  
  <!-- Text label -->
  <text x="100" y="155" font-family="'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#f8f8ff" text-anchor="middle" letter-spacing="0.5">
    NexHire
  </text>
</svg>